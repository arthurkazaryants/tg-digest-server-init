version: '3.8'

services:
  # Пример приложения - используй как шаблон
  app:
    image: my-app:latest
    restart: unless-stopped
    
    # ВАЖНО: Сеть - ВНУТРЕННЯЯ, не публикуем наружу
    # Используй 127.0.0.1 для localhost-only binding
    # ❌ НЕ используй вот это (публикует наружу):
    # ports:
    #   - "8080:8080"
    # ✅ Используй это для localhost-only:
    ports:
      - "127.0.0.1:8080:8080"
    
    # Или используй expose без ports для внутренней сети
    # expose:
    #   - 8080
    
    # Безопасность
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    
    read_only: true
    tmpfs:
      - /tmp
      - /run
    
    # Volumes
    volumes:
      - app_data:/data:rw
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    
    # Ресурсы
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Переменные окружения
    environment:
      - TZ=Europe/Moscow
      - LOG_LEVEL=info
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    
    # Логирование
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=app"

# Volumes
volumes:
  app_data:
    driver: local

# Networks
# По умолчанию используется bridge сеть 'default'
# Для внутренней сети используй:
networks:
  default:
    driver: bridge
    # internal: true  # Раскомментируй для полной изоляции (нет исходящих соединений)
