# Tg Digest Server SSH Drop-in Configuration
# Автоматически управляемый файл
# Не редактируй вручную, используй bootstrap.sh

# Сетевые параметры
Port 22
ListenAddress 0.0.0.0
ListenAddress ::

# Аутентификация
PermitRootLogin no
PasswordAuthentication no
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no
PubkeyAuthentication yes
UsePAM yes

# Доступ
AllowUsers deploy root
DenyUsers root

# Безопасность
LoginGraceTime 30
MaxAuthTries 3
MaxSessions 10
ClientAliveInterval 300
ClientAliveCountMax 2

# Отключить опасные функции
X11Forwarding no
PermitUserEnvironment no
AllowAgentForwarding no
AllowTcpForwarding no
PermitTunnel no

# Компрессия и TCP параметры
Compression delayed
TCPKeepAlive yes
